<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f6c86e">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/duck-hero.png">
<title>나만의 D-DAY 🐥</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:#FFF9F0;min-height:100vh}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes shine{0%{left:-80%}100%{left:120%}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.45)}70%{box-shadow:0 0 0 10px rgba(251,191,36,0)}}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

/* ── 헤더 ── */
.header{
  background:linear-gradient(170deg,#FEFCE8 0%,#FFF9F0 100%);
  padding:16px 16px 13px;
  position:sticky;top:0;z-index:50;
  border-bottom:2px dashed rgba(251,191,36,.3);
}
.header-inner{max-width:500px;margin:0 auto}
.duck-row{display:flex;align-items:center;gap:13px;margin-bottom:13px}
.duck-img{
  width:58px;height:58px;border-radius:50%;
  object-fit:cover;
  box-shadow:0 4px 16px rgba(245,158,11,.35);
  border:3px solid #FEF08A;
  animation:float 3s ease-in-out infinite;
  flex-shrink:0;cursor:pointer
}
.duck-img:hover{animation:none;transform:scale(1.08) rotate(-5deg);transition:transform .2s}
.hero-info{flex:1}
.hero-title{font-size:21px;font-weight:900;color:#78350F;letter-spacing:-.5px}
.hero-date{font-size:11px;color:#B45309;font-weight:700;margin-top:2px}
.hero-right{text-align:right}
.today-pill{
  display:inline-block;padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:900;
}
.today-pill.has{background:linear-gradient(135deg,#FBBF24,#F59E0B);color:white;box-shadow:0 3px 10px rgba(245,158,11,.4)}
.today-pill.none{background:#F3F4F6;color:#9CA3AF}
.total-txt{font-size:10px;color:#9CA3AF;font-weight:700;margin-top:4px}

.search-wrap{position:relative}
.search-inp{
  width:100%;border:2px solid #FDE68A;border-radius:14px;
  padding:9px 14px 9px 40px;
  font-family:"Nunito",sans-serif;font-size:13px;font-weight:700;
  outline:none;background:white;color:#1C1917;transition:border-color .2s,box-shadow .2s
}
.search-inp:focus{border-color:#FBBF24;box-shadow:0 0 0 3px rgba(251,191,36,.15)}
.search-inp::placeholder{color:#D1D5DB}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.tool-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tool-btn{
  border:none;border-radius:12px;padding:8px 12px;cursor:pointer;
  font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;
  background:white;color:#92400E;box-shadow:0 2px 8px rgba(0,0,0,.06)
}
.tool-btn.primary{background:#FFF7ED;color:#C2410C}

/* ── 콘텐츠 ── */
.content{max-width:500px;margin:0 auto;padding:16px 14px 110px}

/* ── 섹션 헤더 ── */
.sec-hd{
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
  font-size:10.5px;font-weight:900;letter-spacing:.9px;
  color:#9CA3AF;text-transform:uppercase;user-select:none
}
.sec-cnt{background:#F3F4F6;color:#6B7280;border-radius:20px;padding:1px 8px;font-size:10px;font-weight:800}

/* ── 오늘 배너 ── */
.today-card{
  background:linear-gradient(135deg,#FEFCE8,#FEF08A);
  border:2px solid #FBBF24;border-radius:22px;
  padding:15px 16px;margin-bottom:10px;
  position:relative;overflow:hidden;
  animation:fadeIn .3s ease, pulse 2.5s infinite;
}
.today-card::before{
  content:"";position:absolute;top:0;left:-80%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
  animation:shine 3s ease-in-out infinite
}
.today-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:white;color:#D97706;
  font-size:10px;font-weight:900;padding:2px 9px;border-radius:20px;
  margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.today-title{font-size:16px;font-weight:900;color:#78350F;line-height:1.3}
.today-date-txt{font-size:10.5px;color:#92400E;font-weight:700;margin-top:3px}
.today-memo{
  font-size:12px;color:#92400E;margin-top:8px;
  background:rgba(255,255,255,.55);border-radius:10px;
  padding:6px 10px;line-height:1.55
}
.today-actions{
  position:absolute;top:11px;right:11px;
  display:flex;gap:4px;opacity:0;transition:opacity .2s
}
.today-card:hover .today-actions{opacity:1}

/* ── 일반 카드 (고정 + D-DAY 통합) ── */
.item-card{
  background:white;border-radius:18px;padding:14px 15px;
  margin-bottom:9px;position:relative;overflow:hidden;
  transition:all .2s;animation:fadeIn .25s ease;
  border:1.5px solid #F3F4F6;
}
.item-card:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(0,0,0,.09)}
.item-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.item-title{font-size:15px;font-weight:800;color:#1C1917;line-height:1.35;flex:1;padding-right:10px}
.item-badge{
  font-size:11px;font-weight:900;padding:3px 10px;
  border-radius:20px;white-space:nowrap;flex-shrink:0
}
.badge-pin{background:#DBEAFE;color:#1D4ED8}
.badge-d1,.badge-d2,.badge-d3{background:#FEE2E2;color:#DC2626}
.badge-d7{background:#FEF3C7;color:#D97706}
.badge-far{background:#F3F4F6;color:#374151}
.item-date{font-size:11px;color:#9CA3AF;font-weight:600;margin-top:1px}
.item-memo{
  font-size:12.5px;color:#4B5563;margin-top:8px;
  border-radius:10px;padding:6px 11px;line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.item-actions{
  position:absolute;top:10px;right:10px;
  display:flex;gap:3px;opacity:0;transition:opacity .2s
}
.item-card:hover .item-actions{opacity:1}

/* ── 지난 카드 ── */
.past-card{
  background:#FAFAFA;border-radius:14px;padding:11px 14px;
  margin-bottom:7px;position:relative;overflow:hidden;
  transition:all .2s;animation:fadeIn .25s ease;
  border:1px solid #F3F4F6;opacity:.7
}
.past-card:hover{opacity:1;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.past-top{display:flex;justify-content:space-between;align-items:center}
.past-title{font-size:13.5px;font-weight:700;color:#6B7280;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
.past-badge{font-size:11px;font-weight:900;color:#9CA3AF;background:#F3F4F6;padding:2px 8px;border-radius:20px;flex-shrink:0}
.past-date{font-size:10.5px;color:#9CA3AF;margin-top:2px}
.past-actions{
  position:absolute;top:8px;right:8px;
  display:flex;gap:3px;opacity:0;transition:opacity .2s
}
.past-card:hover .past-actions{opacity:1}
.past-hint{font-size:11.5px;color:#9CA3AF;font-weight:600;padding:5px 3px;cursor:pointer}

/* ── 버튼 공통 ── */
.act-btn{
  width:27px;height:27px;border-radius:8px;border:none;cursor:pointer;
  font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:transform .15s
}
.act-btn:hover{transform:scale(1.15)}

/* ── FAB ── */
.fab{
  position:fixed;bottom:26px;right:22px;
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#FBBF24,#F59E0B);
  border:none;cursor:pointer;
  box-shadow:0 6px 22px rgba(245,158,11,.5);
  transition:all .25s;z-index:40;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;color:white;font-weight:300;line-height:1
}
.fab:hover{transform:scale(1.1) rotate(90deg);box-shadow:0 10px 30px rgba(245,158,11,.6)}

/* ── 모달 ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;
  z-index:1000;backdrop-filter:blur(8px)
}
.overlay.open{display:flex}
.modal{
  background:white;border-radius:28px 28px 0 0;
  padding:24px 20px 40px;
  width:100%;max-width:500px;max-height:90vh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)
}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-ttl{font-size:17px;font-weight:900;color:#1C1917}
.modal-x{background:none;border:none;font-size:22px;cursor:pointer;color:#9CA3AF;line-height:1}
.fgroup{display:flex;flex-direction:column;gap:14px}
.flabel{font-size:11.5px;font-weight:800;color:#374151;margin-bottom:6px;display:block}
.finput{
  width:100%;border:2px solid #E5E7EB;border-radius:14px;
  padding:11px 14px;font-family:"Nunito",sans-serif;
  font-size:14px;font-weight:700;outline:none;
  background:#FAFAFA;color:#1C1917;transition:border-color .2s;resize:none
}
.finput:focus{border-color:#FBBF24;background:white}
.row-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tog-wrap{display:flex;align-items:center;gap:7px}
.tog-txt{font-size:11px;color:#6B7280;font-weight:700}
.tog{width:44px;height:24px;border-radius:12px;background:#E5E7EB;position:relative;cursor:pointer;border:none;transition:background .25s;flex-shrink:0}
.tog.on{background:#FBBF24}
.tog-k{width:18px;height:18px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 4px rgba(0,0,0,.2);pointer-events:none}
.tog.on .tog-k{left:23px}
.cdots{display:flex;gap:9px;flex-wrap:wrap}
.cdot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;position:relative}
.cdot:hover{transform:scale(1.1)}
.cdot.active{border-color:#1C1917;transform:scale(1.18)}
.cdot.active::after{content:"✓";color:white;font-size:13px;font-weight:900;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.sbtn{
  width:100%;padding:14px;border:none;border-radius:16px;
  font-family:"Nunito",sans-serif;font-size:15px;font-weight:900;
  cursor:pointer;transition:all .2s
}
.sbtn:not(:disabled){background:linear-gradient(135deg,#FBBF24,#F59E0B);color:white;box-shadow:0 4px 14px rgba(245,158,11,.4)}
.sbtn:disabled{background:#F3F4F6;color:#9CA3AF;cursor:not-allowed}

.empty{text-align:center;padding:60px 20px;color:#9CA3AF}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#FDE68A;border-radius:4px}
</style>
</head>

<script>
const COLORS=[
  {bg:"#FFF7ED",left:"#F97316",memo:"#FFF3E8"},
  {bg:"#FFFBEB",left:"#FBBF24",memo:"#FFFBEB"},
  {bg:"#F0FDF4",left:"#22C55E",memo:"#F0FDF4"},
  {bg:"#EFF6FF",left:"#3B82F6",memo:"#EFF6FF"},
  {bg:"#FDF4FF",left:"#A855F7",memo:"#FDF4FF"},
  {bg:"#FFF1F2",left:"#F43F5E",memo:"#FFF1F2"},
];
const ACC=["#F97316","#FBBF24","#22C55E","#3B82F6","#A855F7","#F43F5E"];
const WD=["일","월","화","수","목","금","토"];

let items=[];
try{items=JSON.parse(localStorage.getItem("dday-v3")||"[]")}catch(e){}
if(!items.length){
  const d=n=>new Date(Date.now()+n*86400000).toISOString().split("T")[0];
  items=[
    {id:"1",title:"프로젝트 마감 🚀",date:d(2),memo:"최종 보고서 제출 및 발표 준비",color:0},
    {id:"2",title:"매일 운동하기 💪",date:null,memo:"스쿼트 50개, 플랭크 1분",color:2},
    {id:"3",title:"생일 파티 🎂",date:d(14),memo:"케이크 예약 + 선물 구매",color:5},
    {id:"4",title:"팀 미팅 📊",date:d(6),memo:"준비물: 노트북, 발표자료",color:3},
    {id:"5",title:"영어 공부 📚",date:null,memo:"Anki 30분 이상",color:4},
    {id:"6",title:"지난 스터디",date:d(-3),memo:"후기 정리 필요",color:1},
    {id:"7",title:"헬스장 등록",date:d(-10),memo:"3개월권 끊기",color:2},
  ];
}

let editId=null,selColor=0,hasDate=true,pastOpen=false;

function persist(){try{localStorage.setItem("dday-v3",JSON.stringify(items))}catch(e){}}
function normalizeImportItem(raw,index){
  if(!raw||typeof raw!=="object")return null;
  const title=typeof raw.title==="string"?raw.title.trim():"";
  if(!title)return null;
  const color=Number.isInteger(raw.color)&&raw.color>=0&&raw.color<COLORS.length?raw.color:0;
  return{
    id:typeof raw.id==="string"&&raw.id?raw.id:`import-${index}-${Date.now()}`,
    title,
    date:typeof raw.date==="string"&&raw.date?raw.date:null,
    memo:typeof raw.memo==="string"?raw.memo.trim():"",
    color
  };
}
function exportData(){
  const stamp=new Date().toISOString().replace(/:/g,"-");
  const payload={exportedAt:new Date().toISOString(),source:"duck-memo",items};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`duck-memo-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function importData(event){
  const file=event.target.files&&event.target.files[0];
  if(!file)return;
  file.text().then(text=>{
    const parsed=JSON.parse(text);
    const incoming=Array.isArray(parsed)?parsed:(Array.isArray(parsed.items)?parsed.items:null);
    if(!incoming)throw new Error("invalid");
    const normalized=incoming.map(normalizeImportItem).filter(Boolean);
    if(!normalized.length){alert("가져올 메모가 없어요.");return;}
    const map=new Map(items.map(item=>[item.id,item]));
    normalized.forEach(item=>map.set(item.id,item));
    items=Array.from(map.values());
    persist();
    render();
    alert(`${normalized.length}개의 메모를 가져왔어요.`);
  }).catch(()=>{
    alert("가져오기 파일 형식을 읽지 못했어요.");
  }).finally(()=>{
    event.target.value="";
  });
}
function dday(ds){
  if(!ds)return null;
  const t=new Date();t.setHours(0,0,0,0);
  return Math.round((new Date(ds+"T00:00:00")-t)/86400000);
}
function fmt(ds){
  if(!ds)return"";
  const d=new Date(ds+"T00:00:00");
  return d.getFullYear()+". "+(d.getMonth()+1)+". "+d.getDate()+". ("+WD[d.getDay()]+")";
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function todayISO(){return new Date().toISOString().split("T")[0]}

/* ── 배지 ── */
function itemBadge(it){
  const d=dday(it.date);
  if(d===null) return`<span class="item-badge badge-pin">📌 고정</span>`;
  if(d===0)    return`<span class="item-badge" style="background:#FBBF24;color:white;animation:pop .3s ease">🎉 D-0</span>`;
  if(d<=3)     return`<span class="item-badge badge-d1">D-${d}</span>`;
  if(d<=7)     return`<span class="item-badge badge-d7">D-${d}</span>`;
  return`<span class="item-badge badge-far">D-${d}</span>`;
}

/* ── 오늘 배너 ── */
function todayCard(it){
  const c=COLORS[it.color??0];
  return`<div class="today-card" style="border-color:${ACC[it.color??0]}">
    <div class="today-actions">
      <button class="act-btn" style="background:rgba(255,255,255,.85);color:#92400E" onclick="openEdit('${it.id}')">✏️</button>
      <button class="act-btn" style="background:rgba(255,255,255,.85);color:#B91C1C" onclick="del('${it.id}')">🗑</button>
    </div>
    <div class="today-tag">🎉 오늘이에요!</div>
    <div class="today-title">${esc(it.title)}</div>
    <div class="today-date-txt">📅 ${fmt(it.date)}</div>
    ${it.memo?`<div class="today-memo">${esc(it.memo)}</div>`:""}
  </div>`;
}

/* ── 일반 카드 (고정 + 예정 통합 디자인, 구분 없음) ── */
function itemCard(it){
  const c=COLORS[it.color??0];
  const isFixed=!it.date;
  const accent=ACC[it.color??0];
  return`<div class="item-card" style="background:${c.bg};border-left:4px solid ${accent};border-color:${accent}22">
    <div class="item-actions">
      <button class="act-btn" style="background:rgba(255,255,255,.9);color:#92400E" onclick="openEdit('${it.id}')">✏️</button>
      <button class="act-btn" style="background:rgba(255,255,255,.9);color:#B91C1C" onclick="del('${it.id}')">🗑</button>
    </div>
    <div class="item-top">
      <div class="item-title">${esc(it.title)}</div>
      ${itemBadge(it)}
    </div>
    ${it.date?`<div class="item-date">📅 ${fmt(it.date)}</div>`:"<div class=\"item-date\">📌 날짜 없음 · 항상 표시</div>"}
    ${it.memo?`<div class="item-memo" style="background:${c.memo}">${esc(it.memo)}</div>`:""}
  </div>`;
}

/* ── 지난 카드 ── */
function pastCard(it){
  const d=dday(it.date);
  return`<div class="past-card">
    <div class="past-actions">
      <button class="act-btn" style="background:#F3F4F6;color:#6B7280" onclick="openEdit('${it.id}')">✏️</button>
      <button class="act-btn" style="background:#FEE2E2;color:#B91C1C" onclick="del('${it.id}')">🗑</button>
    </div>
    <div class="past-top">
      <div class="past-title">${esc(it.title)}</div>
      <span class="past-badge">D+${Math.abs(d)}</span>
    </div>
    <div class="past-date">📅 ${fmt(it.date)}</div>
  </div>`;
}

/* ── 메인 렌더 ── */
function render(){
  const now=new Date();
  document.getElementById("todayLabel").textContent=
    now.getFullYear()+"년 "+(now.getMonth()+1)+"월 "+now.getDate()+"일 ("+WD[now.getDay()]+")";

  const q=(document.getElementById("searchInp").value||"").toLowerCase().trim();
  const f=q?items.filter(i=>i.title.toLowerCase().includes(q)||(i.memo||"").toLowerCase().includes(q)):items;

  /* ── 정렬 로직 ──
     1) D-0 (오늘) → 최상단 배너
     2) 고정 (날짜 없음) → 상단 고정, 등록순
     3) 예정 D-DAY (날짜 있음, 미래) → 날짜 가까운 순
     4) 지난 항목 → 접힘
  */
  const todArr  = f.filter(i=>i.date && dday(i.date)===0);
  const fixArr  = f.filter(i=>!i.date);
  const futArr  = f.filter(i=>i.date && dday(i.date)>0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const pastArr = f.filter(i=>i.date && dday(i.date)<0).sort((a,b)=>new Date(b.date)-new Date(a.date));

  /* 헤더 */
  const pill=document.getElementById("todayPill");
  if(todArr.length){
    pill.textContent="🎉 오늘 "+todArr.length+"개";
    pill.className="today-pill has";
  }else{
    pill.textContent="오늘 없음";
    pill.className="today-pill none";
  }
  document.getElementById("totalTxt").textContent="전체 "+items.length+"개";

  const el=document.getElementById("content");

  if(!items.length){
    el.innerHTML=`<div class="empty">
      <div style="font-size:54px;margin-bottom:14px">🐥</div>
      <div style="font-size:17px;font-weight:900;color:#374151;margin-bottom:7px">아직 아무것도 없어요!</div>
      <div style="font-size:13px;line-height:1.8;color:#9CA3AF">+ 버튼을 눌러<br>첫 번째 D-DAY를 추가해봐요 🎯</div>
    </div>`;return;
  }
  if(!f.length&&q){
    el.innerHTML=`<div class="empty">
      <div style="font-size:44px;margin-bottom:12px">🔍</div>
      <div style="font-size:15px;font-weight:800;color:#374151">검색 결과가 없어요</div>
    </div>`;return;
  }

  let html="";

  /* 오늘 섹션 */
  if(todArr.length){
    html+=`<div style="margin-bottom:20px">
      <div class="sec-hd"><span>🎉</span><span>오늘</span><span class="sec-cnt">${todArr.length}</span></div>
      ${todArr.map(todayCard).join("")}
    </div>`;
  }

  /* 고정 + 예정 통합 — 섹션 구분 라벨 없이 하나로 */
  const mainArr=[...fixArr,...futArr];
  if(mainArr.length){
    html+=`<div style="margin-bottom:20px">
      <div class="sec-hd"><span>📋</span><span>할 일 & D-DAY</span><span class="sec-cnt">${mainArr.length}</span></div>
      ${mainArr.map(itemCard).join("")}
    </div>`;
  }

  /* 지난 섹션 */
  if(pastArr.length){
    html+=`<div style="margin-bottom:20px">
      <div class="sec-hd" style="cursor:pointer" onclick="togglePast()">
        <span>⏰</span><span>지난 항목</span>
        <span class="sec-cnt">${pastArr.length}</span>
        <span style="margin-left:auto;font-size:9px;opacity:.5">${pastOpen?"▼":"▶"}</span>
      </div>
      ${pastOpen
        ? pastArr.map(pastCard).join("")
        : `<div class="past-hint" onclick="togglePast()">${pastArr.length}개 · 탭해서 펼쳐보기</div>`
      }
    </div>`;
  }

  el.innerHTML=html;
}

function togglePast(){pastOpen=!pastOpen;render()}

/* ── 색상 팔레트 ── */
function renderColors(){
  document.getElementById("cdots").innerHTML=
    ACC.map((c,i)=>`<div class="cdot${selColor===i?" active":""}" style="background:${c}" onclick="pickColor(${i})"></div>`).join("");
}
function pickColor(i){selColor=i;renderColors()}

/* ── 날짜 토글 ── */
function toggleDate(){
  hasDate=!hasDate;
  document.getElementById("togBtn").className="tog"+(hasDate?" on":"");
  document.getElementById("togTxt").textContent=hasDate?"날짜 있음":"항상 고정";
  document.getElementById("dateWrap").style.display=hasDate?"block":"none";
}

/* ── 모달 ── */
function openAdd(){
  editId=null;hasDate=true;selColor=0;
  document.getElementById("mTitle").textContent="✨ 새로 추가";
  document.getElementById("sbtn").textContent="추가하기 🎉";
  document.getElementById("fTitle").value="";
  document.getElementById("fDate").value=todayISO();
  document.getElementById("fMemo").value="";
  document.getElementById("dateWrap").style.display="block";
  document.getElementById("togBtn").className="tog on";
  document.getElementById("togTxt").textContent="날짜 있음";
  renderColors();updateBtn();
  document.getElementById("overlay").classList.add("open");
  setTimeout(()=>document.getElementById("fTitle").focus(),80);
}
function openEdit(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  editId=id;hasDate=!!it.date;selColor=it.color??0;
  document.getElementById("mTitle").textContent="✏️ 수정하기";
  document.getElementById("sbtn").textContent="수정 완료 ✨";
  document.getElementById("fTitle").value=it.title;
  document.getElementById("fDate").value=it.date||todayISO();
  document.getElementById("fMemo").value=it.memo||"";
  document.getElementById("dateWrap").style.display=hasDate?"block":"none";
  document.getElementById("togBtn").className="tog"+(hasDate?" on":"");
  document.getElementById("togTxt").textContent=hasDate?"날짜 있음":"항상 고정";
  renderColors();updateBtn();
  document.getElementById("overlay").classList.add("open");
  setTimeout(()=>document.getElementById("fTitle").focus(),80);
}
function closeModal(){document.getElementById("overlay").classList.remove("open")}
function handleOvl(e){if(e.target.id==="overlay")closeModal()}
function updateBtn(){document.getElementById("sbtn").disabled=!document.getElementById("fTitle").value.trim()}
function trySave(){
  const title=document.getElementById("fTitle").value.trim();
  if(!title)return;
  const obj={
    id:editId||Date.now().toString(),title,
    date:hasDate?document.getElementById("fDate").value:null,
    memo:document.getElementById("fMemo").value.trim(),
    color:selColor
  };
  items=editId?items.map(i=>i.id===editId?obj:i):[...items,obj];
  persist();closeModal();render();
}
function del(id){
  if(confirm("정말 삭제할까요? 🗑")){items=items.filter(i=>i.id!==id);persist();render()}
}
render();
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("/sw.js").catch(()=>{})})
}
</script>
</body>
</html>
